<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dance Trend Digest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #08080c;
            color: #e4e4e7;
            font-family: 'DM Sans', sans-serif;
            line-height: 1.6;
            padding-bottom: 60px;
        }
        
        .top-bar {
            height: 4px;
            background: linear-gradient(90deg, #ff2d7b, #a855f7, #06b6d4, #ff2d7b);
            background-size: 200% 100%;
            animation: gradientShift 3s ease infinite;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 0%; }
            50% { background-position: 100% 0%; }
            100% { background-position: 0% 0%; }
        }
        
        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        header {
            padding: 40px 0 30px;
            text-align: center;
        }
        
        h1 {
            font-family: 'Syne', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff2d7b, #a855f7, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }
        
        .date {
            font-size: 0.9rem;
            color: #71717a;
            font-weight: 500;
        }
        
        section {
            margin: 50px 0;
        }
        
        h2 {
            font-family: 'Syne', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #fafafa;
            font-weight: 700;
        }
        
        .sound-card {
            background: #111115;
            border: 1px solid #27272a;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            transition: all 0.3s ease;
        }
        
        .sound-card:hover {
            border-color: #a855f7;
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.3);
        }
        
        .sound-card h3 {
            font-family: 'Syne', sans-serif;
            font-size: 1.1rem;
            color: #fafafa;
            margin-bottom: 8px;
            font-weight: 600;
        }
        
        .stats {
            display: flex;
            gap: 16px;
            margin: 12px 0;
            font-size: 0.85rem;
            color: #a1a1aa;
        }
        
        .stat-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }
        
        .tag {
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .tag-choreo { background: rgba(255, 45, 123, 0.15); color: #ff2d7b; }
        .tag-transition { background: rgba(168, 85, 247, 0.15); color: #a855f7; }
        .tag-duet { background: rgba(6, 182, 212, 0.15); color: #06b6d4; }
        .tag-background { background: rgba(251, 191, 36, 0.15); color: #fbbf24; }
        
        .creator-spotlight {
            display: grid;
            gap: 16px;
        }
        
        .creator-card {
            background: #111115;
            border: 1px solid #27272a;
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .creator-name {
            font-family: 'Syne', sans-serif;
            font-size: 1.1rem;
            color: #06b6d4;
            font-weight: 600;
        }
        
        .creator-stats {
            display: flex;
            gap: 20px;
            font-size: 0.9rem;
            color: #a1a1aa;
            margin: 8px 0;
        }
        
        .hashtags {
            font-size: 0.85rem;
            color: #71717a;
        }
        
        .ideas-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }
        
        @media (max-width: 600px) {
            .ideas-grid {
                grid-template-columns: 1fr;
            }
        }
        
        .idea-card {
            background: #111115;
            border: 2px solid transparent;
            background-clip: padding-box;
            border-radius: 12px;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        
        .idea-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 12px;
            padding: 2px;
            background: linear-gradient(135deg, #ff2d7b, #a855f7, #06b6d4);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }
        
        .idea-number {
            font-family: 'Syne', sans-serif;
            font-size: 3rem;
            font-weight: 800;
            color: rgba(168, 85, 247, 0.15);
            line-height: 1;
            margin-bottom: 8px;
        }
        
        .idea-title {
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            color: #fafafa;
            margin-bottom: 12px;
            font-weight: 600;
        }
        
        .idea-details {
            font-size: 0.8rem;
            color: #a1a1aa;
            margin-bottom: 12px;
            line-height: 1.5;
        }
        
        .idea-why {
            font-size: 0.8rem;
            color: #71717a;
            font-style: italic;
            border-left: 2px solid #a855f7;
            padding-left: 10px;
        }
        
        footer {
            text-align: center;
            padding: 40px 20px 20px;
            color: #71717a;
            font-size: 0.85rem;
        }
        
        .footer-text {
            margin-bottom: 8px;
            font-weight: 600;
        }
        
        .timestamp {
            font-size: 0.75rem;
            color: #52525b;
        }
        
        a {
            color: #06b6d4;
            text-decoration: none;
        }
        
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="top-bar"></div>
    
    <div class="container">
        <header>
            <h1>Dance Trend Digest</h1>
            <p class="date">January 2025</p>
        </header>
        
        <section>
            <h2>🎵 Trending Sounds</h2>
            
            <div class="sound-card">
                <h3>TikTok Dance Challenges</h3>
                <div class="stats">
                    <div class="stat-item">
                        <span>👁️</span>
                        <span>214.5B views</span>
                    </div>
                    <div class="stat-item">
                        <span>❤️</span>
                        <span>12.2M likes</span>
                    </div>
