<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dance Trend Digest - April 22, 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #08080c;
            color: #ffffff;
            font-family: 'DM Sans', sans-serif;
            line-height: 1.6;
            padding-bottom: 60px;
        }
        
        .gradient-bar {
            height: 6px;
            background: linear-gradient(90deg, #ff2d7b, #a855f7, #06b6d4, #ff2d7b);
            background-size: 200% 100%;
            animation: gradientShift 3s ease infinite;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        header {
            padding: 40px 0 30px;
            text-align: center;
        }
        
        h1 {
            font-family: 'Syne', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff2d7b, #a855f7, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        
        .date {
            color: #888;
            font-size: 0.9rem;
            font-weight: 500;
        }
        
        section {
            margin: 50px 0;
        }
        
        h2 {
            font-family: 'Syne', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .sound-card {
            background: #12121a;
            border: 1px solid #1f1f2e;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }
        
        .sound-card:hover {
            border-color: #a855f7;
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.3);
            transform: translateY(-2px);
        }
        
        .sound-name {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 10px;
        }
        
        .sound-name a {
            color: #06b6d4;
            text-decoration: none;
            transition: color 0.2s ease;
        }
        
        .sound-name a:hover {
            color: #ff2d7b;
        }
        
        .creator-handle {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }
        
        .creator-handle a {
            color: #a855f7;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
        }
        
        .creator-handle a:hover {
            color: #ff2d7b;
        }
        
        .stats {
            display: flex;
            gap: 20px;
            margin: 12px 0;
            font-size: 0.85rem;
            color: #666;
        }
        
        .stat-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }
        
        .tag {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        
        .tag-choreo {
            background: rgba(255, 45, 123, 0.2);
            color: #ff2d7b;
        }
        
        .tag-transition {
            background: rgba(168, 85, 247, 0.2);
            color: #a855f7;
        }
        
        .tag-duet {
            background: rgba(6, 182, 212, 0.2);
            color: #06b6d4;
        }
        
        .tag-background {
            background: rgba(255, 255, 255, 0.1);
            color: #aaa;
        }
        
        .format-card {
            background: #12121a;
            border: 1px solid #1f1f2e;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
        }
        
        .format-title {
            font-weight: 700;
            font-size: 1.1rem;
            color: #ff2d7b;
            margin-bottom: 8px;
        }
        
        .format-desc {
            color: #aaa;
            font-size: 0.95rem;
        }
        
        .creator-spotlight-card {
            background: linear-gradient(135deg, rgba(255, 45, 123, 0.1), rgba(168, 85, 247, 0.1));
            border: 1px solid #ff2d7b;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
        }
        
        .creator-name {
            font-family: 'Syne', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        .creator-name a {
            color: #ffffff;
            text-decoration: none;
            transition: color 0.2s ease;
        }
        
        .creator-name a:hover {
            color: #ff2d7b;
        }
        
        .creator-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 15px 0;
        }
        
        .creator-stat {
            text-align: center;
        }
        
        .creator-stat-value {
            font-size: 1.3rem;
            font-weight: 700;
            color: #a855f7;
        }
        
        .creator-stat-label {
            font-size: 0.8rem;
            color: #888;
            text-transform: uppercase;
        }
        
        .ideas-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 25px;
        }
        
        @media (max-width: 600px) {
            .ideas-grid {
                grid-template-columns: 1fr;
            }
        }
        
        .idea-card {
            background: #12121a;
            border: 2px solid transparent;
            border-radius: 12px;
            padding: 25px;
            position: relative;
            overflow: hidden;
        }
        
        .idea-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 12px;
            padding: 2px;
            background: linear-gradient(135deg, #ff2d7b, #a855f7, #06b6d4);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }
        
        .idea-number {
            position: absolute;
            top: 10px;
            right: 15px;
            font-family: 'Syne', sans-serif;
            font-size: 4rem;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.05);
            line-height: 1;
        }
        
        .idea-title {
            font-family: 'Syne', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 15px;
            position: relative;
            z-index: 1;
        }
        
        .idea-details {
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 12px;
            position: relative;
            z-index: 1;
        }
        
        .idea-why {
            font-style: italic;
            font-size: 0.9rem;
            color: #888;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #1f1f2e;
            position: relative;
            z-index: 1;
        }
        
        .example-links {
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            position: relative;
            z-index: 1;
        }
        
        .example-btn {
            display: inline-block;
            padding: 8px 16px;
            background: linear-gradient(135deg, #ff2d7b, #a855f7);
            color: #ffffff;
            text-decoration: none;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            text-align: center;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }
        
        .example-btn:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }
        
        footer {
            text-align: center;
            padding: 40px 20px;
            color: #666;
            font-size: 0.9rem;
        }
        
        .footer-divider {
            color: #444;
            margin: 0 10px;
        }
        
        .timestamp {
            color: #888;
            font-size: 0.85rem;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="gradient-bar"></div>
