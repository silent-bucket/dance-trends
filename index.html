<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dance Trend Digest - April 22, 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #08080c;
            color: #e5e7eb;
            font-family: 'DM Sans', sans-serif;
            line-height: 1.6;
            padding-bottom: 40px;
        }
        
        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 0 16px;
        }
        
        .animated-bar {
            height: 4px;
            background: linear-gradient(90deg, #ff2d7b, #a855f7, #06b6d4, #ff2d7b);
            background-size: 200% 100%;
            animation: gradient 3s linear infinite;
        }
        
        @keyframes gradient {
            0% { background-position: 0% 0%; }
            100% { background-position: 200% 0%; }
        }
        
        header {
            padding: 40px 0 32px;
            text-align: center;
        }
        
        h1 {
            font-family: 'Syne', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff2d7b, #a855f7, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }
        
        .date {
            color: #9ca3af;
            font-size: 0.95rem;
        }
        
        section {
            margin-bottom: 48px;
        }
        
        h2 {
            font-family: 'Syne', sans-serif;
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 24px;
            color: #f9fafb;
        }
        
        .sound-card {
            background: #111116;
            border: 1px solid #1f1f29;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            transition: all 0.3s ease;
        }
        
        .sound-card:hover {
            border-color: #a855f7;
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.3);
        }
        
        .sound-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 12px;
        }
        
        .sound-title {
            font-weight: 700;
            font-size: 1.1rem;
            color: #f9fafb;
        }
        
        .tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-left: 8px;
        }
        
        .tag-choreo {
            background: rgba(255, 45, 123, 0.2);
            color: #ff2d7b;
        }
        
        .tag-transition {
            background: rgba(168, 85, 247, 0.2);
            color: #a855f7;
        }
        
        .tag-duet {
            background: rgba(6, 182, 212, 0.2);
            color: #06b6d4;
        }
        
        .tag-background {
            background: rgba(251, 146, 60, 0.2);
            color: #fb923c;
        }
        
        .sound-stats {
            color: #9ca3af;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }
        
        .sound-creator {
            color: #06b6d4;
            font-weight: 500;
        }
        
        .hashtags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }
        
        .hashtag {
            background: #1f1f29;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            color: #d1d5db;
        }
        
        .format-grid {
            display: grid;
            gap: 16px;
        }
        
        .format-card {
            background: #111116;
            border: 1px solid #1f1f29;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s ease;
        }
        
        .format-card:hover {
            border-color: #ff2d7b;
            box-shadow: 0 0 20px rgba(255, 45, 123, 0.3);
        }
        
        .format-title {
            font-weight: 700;
            font-size: 1.1rem;
            color: #f9fafb;
            margin-bottom: 8px;
        }
        
        .format-desc {
            color: #9ca3af;
            font-size: 0.95rem;
        }
        
        .creator-spotlight {
            background: linear-gradient(135deg, rgba(255, 45, 123, 0.1), rgba(168, 85, 247, 0.1));
            border: 1px solid #a855f7;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 16px;
        }
        
        .creator-name {
            font-family: 'Syne', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: #f9fafb;
            margin-bottom: 8px;
        }
        
        .creator-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 16px;
        }
        
        .stat-item {
            background: rgba(17, 17, 22, 0.6);
            padding: 12px;
            border-radius: 8px;
        }
        
        .stat-label {
            color: #9ca3af;
            font-size: 0.85rem;
            margin-bottom: 4px;
        }
        
        .stat-value {
            font-weight: 700;
            font-size: 1.2rem;
            color: #06b6d4;
        }
        
        .ideas-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }
        
        .idea-card {
            background: #111116;
            border-radius: 12px;
            padding: 20px;
            position: relative;
            overflow: hidden;
            border: 2px solid transparent;
            background-clip: padding-box;
        }
        
        .idea-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 12px;
            padding: 2px;
            background: linear-gradient(135deg, #ff2d7b, #a855f7, #06b6d4);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0.5;
        }
        
        .idea-number {
            position: absolute;
            top: -10px;
            right: 10px;
            font-family: 'Syne', sans-serif;
            font-size: 4rem;
            font-weight: 800;
            color: rgba(168, 85, 247, 0.1);
            line-height: 1;
        }
        
        .idea-title {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            color: #f9fafb;
            margin-bottom: 12px;
            position: relative;
            z-index: 1;
        }
        
        .idea-detail {
            font-size: 0.85rem;
            color: #9ca3af;
            margin-bottom: 6px;
            position: relative;
            z-index: 1;
        }
        
        .idea-why {
            font-style: italic;
            font-size: 0.85rem;
            color: #a855f7;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #1f1f29;
            position: relative;
            z-index: 1;
        }
        
        footer {
            text-align: center;
            padding: 32px 0;
            color: #6b7280;
            font-size: 0.9rem;
        }
        
        .footer-divider {
            color: #4b5563;
            margin: 0 8px;
        }
        
        @media (max-width: 640px) {
            h1 {
                font-size: 2rem;
            }
            
            h2 {
                font-size: 1.5rem;
            }
            
            .ideas-grid {
                grid-template-columns: 1fr;
            }
            
            .creator-stats {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="animated-bar"></div>
    
    <div class="container">
        <header>
            <h1>Dance Trend Digest</h1>
            <p class="date">April 22, 2026</p>
        </header>
        
        <section>
            <h2>🎵 Trending Sounds</h2>
            
            <div class="sound-card">
                <div class="sound-header">
                    <span class="sound-title">Random Dance Challenge</span>
                    <span class="tag tag-choreo">Full Choreo</span>
                </div>
                <div class="sound-stats">
                    <span class="sound-creator">@aeedais</span> • 214.5B views • 12.2M likes
                </div>
                <div class="hashtags">
                    <span class="hashtag">#tiktokrandomdance</span>
                    <span class="hashtag">#dancechallenge</span
